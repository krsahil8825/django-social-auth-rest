<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>OAuth Test</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body class="bg-zinc-950 text-zinc-100">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-sm rounded-lg border border-zinc-800 bg-zinc-900 p-6">
        <h1 class="text-xl font-semibold text-center mb-6">OAuth Test</h1>

        <div class="space-y-3">
          <button
            id="google-button"
            class="w-full rounded-md border border-zinc-700 px-4 py-2 text-sm font-medium hover:bg-zinc-800"
          >
            Continue with Google
          </button>

          <button
            id="github-button"
            class="w-full rounded-md bg-zinc-100 px-4 py-2 text-sm font-medium text-zinc-900 hover:bg-zinc-200"
          >
            Continue with GitHub
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
